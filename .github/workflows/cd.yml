name: CD

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: cd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Create release
    runs-on: t-x-kjldev

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Setup just
        uses: extractions/setup-just@v4

      - id: version
        name: Read version
        shell: bash
        run: |
          set -euo pipefail

          version="$(node -p "require('./package.json').version")"
          echo "value=${version}" >> "${GITHUB_OUTPUT}"
          echo "tag=v${version}" >> "${GITHUB_OUTPUT}"

          if [[ "${version}" == *-* ]]; then
            echo "prerelease=true" >> "${GITHUB_OUTPUT}"
          else
            echo "prerelease=false" >> "${GITHUB_OUTPUT}"
          fi

      - id: release_guard
        name: Block duplicate version
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail

          tag_exists=false
          release_exists=false
          if git ls-remote --exit-code --tags origin "refs/tags/${RELEASE_TAG}" > /dev/null 2>&1; then
            tag_exists=true
          fi

          release_status="$(
            curl -sS \
              -o release.json \
              -w "%{http_code}" \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/tags/${RELEASE_TAG}"
          )"

          case "${release_status}" in
            200)
              release_exists=true
              ;;
            404)
              ;;
            *)
              echo "::error::Unexpected GitHub API response while checking release ${RELEASE_TAG}: ${release_status} (expected 200 or 404). Check GitHub token permissions, API availability, or rate limits."
              cat release.json
              exit 1
              ;;
          esac

          if [[ "${tag_exists}" == "true" && "${release_exists}" == "true" ]]; then
            echo "::notice::Tag and release ${RELEASE_TAG} already exist; skipping release pipeline."
            echo "skip=true" >> "${GITHUB_OUTPUT}"
            rm -f release.json
            exit 0
          fi

          if [[ "${tag_exists}" == "true" || "${release_exists}" == "true" ]]; then
            echo "::error::Inconsistent release state for ${RELEASE_TAG}: tag_exists=${tag_exists}, release_exists=${release_exists}. Resolve by removing the orphaned tag or release before re-running CD."
            cat release.json
            exit 1
          fi

          rm -f release.json
          echo "skip=false" >> "${GITHUB_OUTPUT}"

      - name: Restore packages
        if: steps.release_guard.outputs.skip != 'true'
        run: just restore

      - name: Build
        if: steps.release_guard.outputs.skip != 'true'
        run: just build

      - name: Test
        if: steps.release_guard.outputs.skip != 'true'
        run: just test

      - name: Pack
        if: steps.release_guard.outputs.skip != 'true'
        run: just pack

      - id: create_release
        name: Create GitHub release
        if: steps.release_guard.outputs.skip != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          draft: true
          prerelease: ${{ steps.version.outputs.prerelease }}
          fail_on_unmatched_files: true
          files: |
            artifacts/packages/*.nupkg
            artifacts/packages/*.snupkg

      - name: Publish GitHub release
        if: steps.release_guard.outputs.skip != 'true'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
          RELEASE_ID: ${{ steps.create_release.outputs.id }}
          PRERELEASE: ${{ steps.version.outputs.prerelease }}
        run: |
          set -euo pipefail
          publish_response="$(mktemp)"
          if [[ -z "${publish_response}" || ! -f "${publish_response}" ]]; then
            echo "::error::Failed to allocate a temporary file for the publish response."
            exit 1
          fi
          trap 'rm -f "${publish_response}"' EXIT

          if [[ -z "${RELEASE_ID}" ]]; then
            echo "::error::Release id is missing from create_release step output."
            exit 1
          fi

          case "${PRERELEASE}" in
            true|false) ;;
            *)
              echo "::error::Invalid prerelease value: ${PRERELEASE}"
              exit 1
              ;;
          esac

          publish_payload="$(jq -cn --argjson prerelease "${PRERELEASE}" '{draft: false, prerelease: $prerelease}')"

          publish_status="$(
            curl -sS \
              -o "${publish_response}" \
              -w "%{http_code}" \
              -X PATCH \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}" \
              -d "${publish_payload}"
          )"

          if [[ "${publish_status}" != "200" ]]; then
            echo "::error::Failed to publish release id ${RELEASE_ID} (status ${publish_status})."
            echo "API response:" >&2
            jq -c '.' "${publish_response}" >&2 || cat "${publish_response}" >&2 || true
            exit 1
          fi
