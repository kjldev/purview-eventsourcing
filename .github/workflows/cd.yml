name: CD

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish-packages:
    runs-on: t-x-kjldev

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Setup just
        uses: extractions/setup-just@v3

      - name: Restore tools
        run: just tools

      - name: Restore packages
        run: just restore

      - name: Print version
        run: just version

      - name: Pack
        run: just pack

      - name: Fail if package version already exists
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          Add-Type -AssemblyName System.IO.Compression.FileSystem

          $headers = @{
            Authorization         = "Bearer $env:GITHUB_TOKEN"
            Accept                = "application/vnd.github+json"
            "X-GitHub-Api-Version" = "2022-11-28"
          }

          $owner = "${{ github.repository_owner }}"
          $ownerDetails = Invoke-RestMethod -Uri "https://api.github.com/users/$owner" -Headers $headers
          $packageApiBase = if ($ownerDetails.type -eq "Organization") {
            "https://api.github.com/orgs/$owner/packages/nuget"
          } else {
            "https://api.github.com/users/$owner/packages/nuget"
          }

          function Get-PackageMetadata([string]$packagePath) {
            $archive = [System.IO.Compression.ZipFile]::OpenRead($packagePath)
            try {
              $nuspecEntry = $archive.Entries | Where-Object FullName -like "*.nuspec" | Select-Object -First 1
              if ($null -eq $nuspecEntry) {
                throw "No nuspec found in $packagePath."
              }

              $reader = [System.IO.StreamReader]::new($nuspecEntry.Open())
              try {
                [xml]$nuspec = $reader.ReadToEnd()
              } finally {
                $reader.Dispose()
              }

              return [pscustomobject]@{
                Id      = [string]$nuspec.package.metadata.id
                Version = [string]$nuspec.package.metadata.version
              }
            } finally {
              $archive.Dispose()
            }
          }

          $packages = @(Get-ChildItem -Path "artifacts/packages" -Filter "*.nupkg" | Sort-Object Name)
          if ($packages.Count -eq 0) {
            throw "No packages found in artifacts/packages."
          }

          foreach ($packageFile in $packages) {
            $package = Get-PackageMetadata -packagePath $packageFile.FullName
            $packageName = [Uri]::EscapeDataString($package.Id.ToLowerInvariant())
            $uri = "$packageApiBase/$packageName/versions?per_page=100"

            try {
              $versions = @(Invoke-RestMethod -Uri $uri -Headers $headers)
            } catch {
              if ($_.Exception.Response -and $_.Exception.Response.StatusCode -eq 404) {
                Write-Host "No existing GitHub Package found for $($package.Id)."
                continue
              }

              throw
            }

            if ($versions | Where-Object { $_.name -eq $package.Version }) {
              throw "Package $($package.Id) version $($package.Version) already exists in GitHub Packages."
            }
          }

      - name: Publish packages
        env:
          NUGET_SOURCE: https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json
          NUGET_API_KEY: ${{ secrets.GITHUB_TOKEN }}
        run: just publish "$env:NUGET_SOURCE" "$env:NUGET_API_KEY"
