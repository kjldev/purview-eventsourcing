name: CD

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing GitHub release tag to publish package assets from (for example v1.0.0)
        required: false
        type: string
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write

concurrency:
  group: cd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Create release
    runs-on: t-x-kjldev
    env:
      GITHUB_PACKAGES_SOURCE_NAME: github-packages
      GITHUB_PACKAGES_SOURCE_URL: https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Setup just
        uses: extractions/setup-just@v4

      - id: package_mode
        name: Resolve package publish mode
        shell: bash
        env:
          RELEASE_TAG_INPUT: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail

          if [[ -n "${RELEASE_TAG_INPUT}" ]]; then
            echo "use_release_assets=true" >> "${GITHUB_OUTPUT}"
            echo "release_tag=${RELEASE_TAG_INPUT}" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          echo "use_release_assets=false" >> "${GITHUB_OUTPUT}"

      - id: version
        name: Read version
        if: steps.package_mode.outputs.use_release_assets != 'true'
        shell: bash
        run: |
          set -euo pipefail

          version="$(node -p "require('./package.json').version")"
          echo "value=${version}" >> "${GITHUB_OUTPUT}"
          echo "tag=v${version}" >> "${GITHUB_OUTPUT}"

          if [[ "${version}" == *-* ]]; then
            echo "prerelease=true" >> "${GITHUB_OUTPUT}"
          else
            echo "prerelease=false" >> "${GITHUB_OUTPUT}"
          fi

      - id: release_guard
        name: Block duplicate version
        if: steps.package_mode.outputs.use_release_assets != 'true'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail

          tag_exists=false
          release_exists=false
          if git ls-remote --exit-code --tags origin "refs/tags/${RELEASE_TAG}" > /dev/null 2>&1; then
            tag_exists=true
          fi

          release_status="$(
            curl -sS \
              -o release.json \
              -w "%{http_code}" \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/tags/${RELEASE_TAG}"
          )"

          case "${release_status}" in
            200)
              release_exists=true
              ;;
            404)
              ;;
            *)
              echo "::error::Unexpected GitHub API response while checking release ${RELEASE_TAG}: ${release_status} (expected 200 or 404). Check GitHub token permissions, API availability, or rate limits."
              cat release.json
              exit 1
              ;;
          esac

          if [[ "${tag_exists}" == "true" && "${release_exists}" == "true" ]]; then
            echo "::notice::Tag and release ${RELEASE_TAG} already exist; skipping release pipeline."
            echo "skip=true" >> "${GITHUB_OUTPUT}"
            rm -f release.json
            exit 0
          fi

          if [[ "${tag_exists}" == "true" || "${release_exists}" == "true" ]]; then
            echo "::error::Inconsistent release state for ${RELEASE_TAG}: tag_exists=${tag_exists}, release_exists=${release_exists}. Resolve by removing the orphaned tag or release before re-running CD."
            cat release.json
            exit 1
          fi

          rm -f release.json
          echo "skip=false" >> "${GITHUB_OUTPUT}"

      - name: Restore packages
        if: steps.package_mode.outputs.use_release_assets != 'true' && steps.release_guard.outputs.skip != 'true'
        run: just restore

      - name: Build
        if: steps.package_mode.outputs.use_release_assets != 'true' && steps.release_guard.outputs.skip != 'true'
        run: just build

      - name: Test
        if: steps.package_mode.outputs.use_release_assets != 'true' && steps.release_guard.outputs.skip != 'true'
        run: just test

      - name: Pack
        if: steps.package_mode.outputs.use_release_assets != 'true' && steps.release_guard.outputs.skip != 'true'
        run: just pack

      - name: Download existing release packages
        if: steps.package_mode.outputs.use_release_assets == 'true'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.package_mode.outputs.release_tag }}
        run: |
          set -euo pipefail

          rm -rf artifacts/packages
          mkdir -p artifacts/packages

          node <<'NODE'
          const fs = require('node:fs');
          const path = require('node:path');

          const repository = process.env.GITHUB_REPOSITORY;
          const token = process.env.GITHUB_TOKEN;
          const releaseTag = process.env.RELEASE_TAG;
          const outputDirectory = path.resolve('artifacts/packages');

          const jsonHeaders = {
            Authorization: `Bearer ${token}`,
            Accept: 'application/vnd.github+json',
            'X-GitHub-Api-Version': '2022-11-28',
            'User-Agent': 'purview-eventsourcing-cd',
          };

          const binaryHeaders = {
            ...jsonHeaders,
            Accept: 'application/octet-stream',
          };

          (async () => {
            const releaseResponse = await fetch(
              `https://api.github.com/repos/${repository}/releases/tags/${encodeURIComponent(releaseTag)}`,
              { headers: jsonHeaders },
            );

            if (!releaseResponse.ok) {
              throw new Error(
                `Failed to load release ${releaseTag}: ${releaseResponse.status} ${releaseResponse.statusText}`,
              );
            }

            const release = await releaseResponse.json();
            const packageAssets = release.assets
              .filter((asset) => /\.nupkg$/i.test(asset.name))
              .sort((left, right) => left.name.localeCompare(right.name));

            if (packageAssets.length === 0) {
              throw new Error(`Release ${releaseTag} does not contain any .nupkg assets.`);
            }

            for (const asset of packageAssets) {
              const assetResponse = await fetch(asset.url, { headers: binaryHeaders });
              if (!assetResponse.ok) {
                throw new Error(
                  `Failed to download asset ${asset.name}: ${assetResponse.status} ${assetResponse.statusText}`,
                );
              }

              const packagePath = path.join(outputDirectory, asset.name);
              const packageBytes = Buffer.from(await assetResponse.arrayBuffer());
              fs.writeFileSync(packagePath, packageBytes);
              console.log(`Downloaded ${asset.name}`);
            }
          })().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          NODE

      - id: github_packages_source
        name: Configure GitHub Packages source
        if: steps.package_mode.outputs.use_release_assets == 'true' || steps.release_guard.outputs.skip != 'true'
        shell: bash
        env:
          SOURCE_NAME: ${{ env.GITHUB_PACKAGES_SOURCE_NAME }}
          SOURCE_URL: ${{ env.GITHUB_PACKAGES_SOURCE_URL }}
          SOURCE_USERNAME: ${{ github.actor }}
          SOURCE_PASSWORD: ${{ github.token }}
        run: |
          set -euo pipefail

          config_path="${RUNNER_TEMP}/github-packages.nuget.config"
          rm -f "${config_path}"

          dotnet nuget add source "${SOURCE_URL}" \
            --name "${SOURCE_NAME}" \
            --username "${SOURCE_USERNAME}" \
            --password "${SOURCE_PASSWORD}" \
            --store-password-in-clear-text \
            --configfile "${config_path}"

          echo "config_path=${config_path}" >> "${GITHUB_OUTPUT}"

      - name: Publish packages to GitHub Packages
        if: steps.package_mode.outputs.use_release_assets == 'true' || steps.release_guard.outputs.skip != 'true'
        env:
          NUGET_CONFIG_FILE: ${{ steps.github_packages_source.outputs.config_path }}
        run: just publish "${{ env.GITHUB_PACKAGES_SOURCE_NAME }}"

      - name: Publish GitHub release
        if: steps.package_mode.outputs.use_release_assets != 'true' && steps.release_guard.outputs.skip != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ steps.version.outputs.prerelease }}
          fail_on_unmatched_files: true
          files: |
            artifacts/packages/*.nupkg
            artifacts/packages/*.snupkg
