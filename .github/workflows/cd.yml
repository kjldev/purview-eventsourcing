name: CD

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - package.json

permissions:
  contents: write

concurrency:
  group: cd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Create release
    runs-on: t-x-kjldev

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Setup just
        uses: extractions/setup-just@v4

      - id: version
        name: Read version
        shell: bash
        run: |
          set -euo pipefail

          version="$(node -p "require('./package.json').version")"
          echo "value=${version}" >> "${GITHUB_OUTPUT}"
          echo "tag=v${version}" >> "${GITHUB_OUTPUT}"

          if [[ "${version}" == *-* ]]; then
            echo "prerelease=true" >> "${GITHUB_OUTPUT}"
          else
            echo "prerelease=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Block duplicate version
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail

          if git ls-remote --exit-code --tags origin "refs/tags/${RELEASE_TAG}" > /dev/null 2>&1; then
            echo "::error::Tag ${RELEASE_TAG} already exists."
            exit 1
          fi

          release_status="$(
            curl -sS \
              -o release.json \
              -w "%{http_code}" \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/tags/${RELEASE_TAG}"
          )"

          if [[ "${release_status}" == "200" ]]; then
            echo "::error::Release ${RELEASE_TAG} already exists."
            cat release.json
            exit 1
          fi

          if [[ "${release_status}" != "404" ]]; then
            echo "::error::Unexpected GitHub API response: ${release_status}"
            cat release.json
            exit 1
          fi

          rm -f release.json

      - name: Restore packages
        run: just restore

      - name: Build
        run: just build

      - name: Test
        run: just test

      - name: Pack
        run: just pack

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          draft: true
          prerelease: ${{ steps.version.outputs.prerelease }}
          fail_on_unmatched_files: true
          files: |
            artifacts/packages/*.nupkg
            artifacts/packages/*.snupkg

      - name: Publish GitHub release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
          PRERELEASE: ${{ steps.version.outputs.prerelease }}
        run: |
          set -euo pipefail

          release_payload="$(
            curl -sS \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/tags/${RELEASE_TAG}"
          )"

          release_id="$(echo "${release_payload}" | node -e "const fs=require('node:fs');const d=JSON.parse(fs.readFileSync(0,'utf8'));if(!d.id){process.exit(1)};process.stdout.write(String(d.id));")"

          publish_status="$(
            curl -sS \
              -o publish.json \
              -w "%{http_code}" \
              -X PATCH \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/${release_id}" \
              -d "{\"draft\":false,\"prerelease\":${PRERELEASE}}"
          )"

          if [[ "${publish_status}" != "200" ]]; then
            echo "::error::Failed to publish release ${RELEASE_TAG} (status ${publish_status})."
            cat publish.json
            exit 1
          fi

          rm -f publish.json
