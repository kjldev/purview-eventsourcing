name: Manual Release

on:
  workflow_dispatch:
    inputs:
      pack_target_path:
        description: Path to the solution or project to pack (can produce one or many packages)
        required: false
        type: string
        default: src/Purview.EventSourcing.slnx

# Keep this file name stable for NuGet Trusted Publishing policy mapping:
# owner/repository/.github/workflows/release.yml
concurrency:
  group: release-main
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  prepare:
    name: Prepare release metadata and guards
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.value }}
      tag: ${{ steps.version.outputs.tag }}
      prerelease: ${{ steps.version.outputs.prerelease }}
      tag_exists: ${{ steps.tag_state.outputs.exists }}
      pack_target_path: ${{ steps.pack_target.outputs.path }}

    steps:
      - name: Ensure release runs from main
        if: ${{ github.ref != 'refs/heads/main' }}
        run: |
          echo "::error::Releases can only be run from main. Current ref: ${GITHUB_REF}"
          exit 1

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - id: version
        name: Read version from package.json
        shell: bash
        run: |
          set -euo pipefail
          version="$(node -p "require('./package.json').version")"
          tag="v${version}"
          prerelease=false
          if [[ "${version}" == *-* ]]; then
            prerelease=true
          fi

          echo "value=${version}" >> "${GITHUB_OUTPUT}"
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "prerelease=${prerelease}" >> "${GITHUB_OUTPUT}"

      - id: tag_state
        name: Detect remote tag state
        shell: bash
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          tag_sha="$(git ls-remote --tags origin "refs/tags/${TAG}" | awk '{print $1}')"
          if [[ -n "${tag_sha}" ]]; then
            echo "exists=true" >> "${GITHUB_OUTPUT}"
            echo "sha=${tag_sha}" >> "${GITHUB_OUTPUT}"
          else
            echo "exists=false" >> "${GITHUB_OUTPUT}"
            echo "sha=" >> "${GITHUB_OUTPUT}"
          fi

      - name: "Guard: existing tag must target current commit"
        if: ${{ steps.tag_state.outputs.exists == 'true' }}
        shell: bash
        env:
          TAG: ${{ steps.version.outputs.tag }}
          TAG_SHA: ${{ steps.tag_state.outputs.sha }}
        run: |
          set -euo pipefail
          if [[ "${TAG_SHA}" != "${GITHUB_SHA}" ]]; then
            echo "::error::Tag ${TAG} already exists and points to ${TAG_SHA}, expected ${GITHUB_SHA}."
            exit 1
          fi

      - name: "Guard: GitHub release must not already exist"
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          if gh release view "${TAG}" --repo "${GITHUB_REPOSITORY}" > /dev/null 2>&1; then
            echo "::error::GitHub release ${TAG} already exists."
            exit 1
          fi

      - id: pack_target
        name: Resolve pack target path
        shell: bash
        env:
          INPUT_PACK_TARGET_PATH: ${{ inputs.pack_target_path }}
        run: |
          set -euo pipefail
          pack_target="${INPUT_PACK_TARGET_PATH}"
          if [[ ! -f "${pack_target}" ]]; then
            echo "::error::Pack target not found: ${pack_target}"
            exit 1
          fi

          echo "path=${pack_target}" >> "${GITHUB_OUTPUT}"

      - name: Build release notes from CHANGELOG.md
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.value }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail

          awk -v version="${VERSION}" '
            BEGIN { capture=0 }
            /^##[[:space:]]+/ {
              if (capture == 1) exit
              line=$0
              gsub(/^##[[:space:]]+/, "", line)
              if (line == version || line ~ "^\\[" version "\\]") {
                capture=1
                print $0
                next
              }
            }
            capture == 1 { print $0 }
          ' CHANGELOG.md > release-notes.md

          if [[ ! -s release-notes.md ]]; then
            cat > release-notes.md <<EOF
          # ${TAG}

          No matching section was found in CHANGELOG.md for version ${VERSION}.
          This release was created from the current main branch state.
          EOF
          fi

      - name: Upload release notes artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-notes
          path: release-notes.md
          if-no-files-found: error

  validate:
    name: Validate (restore/build/test)
    needs: prepare
    permissions:
      contents: read
    uses: ./.github/workflows/reusable-dotnet-validate.yml
    with:
      solution-path: src/Purview.EventSourcing.slnx
      configuration: Release
      install-node-deps: false
      test-treenode-filter: "/*UnitTest*/*/*/*"

  pack:
    name: Pack NuGet artifact
    needs:
      - prepare
      - validate
    permissions:
      contents: read
    uses: ./.github/workflows/reusable-dotnet-pack.yml
    with:
      pack-target-path: ${{ needs.prepare.outputs.pack_target_path }}
      version: ${{ needs.prepare.outputs.version }}
      configuration: Release
      output-path: ./artifacts/package

  guard-nuget-duplicates:
    name: Guard NuGet duplicates from artifacts
    needs:
      - prepare
      - pack
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v8
        with:
          name: package-artifacts
          path: artifacts/package

      - name: "Guard: each artifact version must not already exist on NuGet"
        shell: bash
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          nupkgs=(artifacts/package/*.nupkg)
          if (( ${#nupkgs[@]} == 0 )); then
            echo "::error::No .nupkg files were produced in artifacts/package."
            exit 1
          fi

          suffix=".${VERSION}.nupkg"
          duplicate_count=0

          for pkg in "${nupkgs[@]}"; do
            file="$(basename "${pkg}")"

            if [[ "${file}" != *"${suffix}" ]]; then
              echo "::error::Package filename '${file}' does not end with expected version suffix '${suffix}'."
              exit 1
            fi

            package_id="${file%${suffix}}"
            package_id_lower="$(echo "${package_id}" | tr '[:upper:]' '[:lower:]')"
            url="https://api.nuget.org/v3-flatcontainer/${package_id_lower}/index.json"
            status_code="$(curl -sS -o nuget-index.json -w "%{http_code}" "${url}")"

            if [[ "${status_code}" == "404" ]]; then
              rm -f nuget-index.json
              continue
            fi

            if [[ "${status_code}" != "200" ]]; then
              echo "::error::Failed to query NuGet flat container (${status_code}) for ${package_id}."
              cat nuget-index.json
              exit 1
            fi

            code=0
            VERSION="${VERSION}" node -e "const fs=require('fs');const data=JSON.parse(fs.readFileSync('nuget-index.json','utf8'));const v=(process.env.VERSION||'').toLowerCase();if(Array.isArray(data.versions)&&data.versions.includes(v)){process.exit(2);}" || code=$?
            rm -f nuget-index.json

            if [[ "${code}" -eq 2 ]]; then
              echo "::error::NuGet package ${package_id} version ${VERSION} already exists."
              duplicate_count=$((duplicate_count + 1))
              continue
            fi
            if [[ "${code}" -ne 0 ]]; then
              echo "::error::NuGet version check failed unexpectedly for ${package_id} with exit code ${code}."
              exit "${code}"
            fi
          done

          if (( duplicate_count > 0 )); then
            exit 1
          fi

  create-release:
    name: Create Git tag and GitHub Release
    needs:
      - prepare
      - pack
      - guard-nuget-duplicates
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      RELEASE_BOT_APP_ID: ${{ secrets.RELEASE_BOT_APP_ID }}
      RELEASE_BOT_PRIVATE_KEY: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate release bot token (optional)
        id: release-bot-token
        if: ${{ env.RELEASE_BOT_APP_ID != '' && env.RELEASE_BOT_PRIVATE_KEY != '' }}
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ env.RELEASE_BOT_APP_ID }}
          private-key: ${{ env.RELEASE_BOT_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}

      - name: Download package artifacts
        uses: actions/download-artifact@v8
        with:
          name: package-artifacts
          path: artifacts/package

      - name: Download release notes
        uses: actions/download-artifact@v8
        with:
          name: release-notes
          path: .

      - name: Create and push Git tag
        if: ${{ needs.prepare.outputs.tag_exists != 'true' }}
        shell: bash
        env:
          TAG: ${{ needs.prepare.outputs.tag }}
          RELEASE_GH_TOKEN: ${{ steps.release-bot-token.outputs.token || github.token }}
        run: |
          set -euo pipefail
          git remote set-url origin "https://x-access-token:${RELEASE_GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${TAG}" "${GITHUB_SHA}"
          git push origin "refs/tags/${TAG}"

      - name: Create GitHub Release and attach artifacts
        shell: bash
        env:
          GH_TOKEN: ${{ steps.release-bot-token.outputs.token || github.token }}
          TAG: ${{ needs.prepare.outputs.tag }}
          PRERELEASE: ${{ needs.prepare.outputs.prerelease }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          assets=(artifacts/package/*.nupkg artifacts/package/*.snupkg)
          if (( ${#assets[@]} == 0 )); then
            echo "::error::No package assets found in artifacts/package."
            exit 1
          fi

          cmd=(release create "${TAG}" "${assets[@]}" --repo "${GITHUB_REPOSITORY}" --title "${TAG}" --notes-file release-notes.md)
          if [[ "${PRERELEASE}" == "true" ]]; then
            cmd+=(--prerelease)
          fi

          gh "${cmd[@]}"

  publish-nuget:
    name: Publish NuGet package (Trusted Publishing)
    needs:
      - prepare
      - create-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      # NuGet Trusted Publishing uses GitHub OIDC and this workflow file identity.
      # Configure a matching trusted publisher policy on nuget.org for:
      #   owner: kjldev
      #   repository: purview-eventsourcing
      #   workflow: .github/workflows/release.yml
      - name: NuGet login
        id: nuget-login
        uses: NuGet/login@v1
        with:
          user: ${{ github.repository_owner }}

      - name: Download package artifacts
        uses: actions/download-artifact@v8
        with:
          name: package-artifacts
          path: artifacts/package

      - name: Publish .nupkg to nuget.org
        shell: bash
        env:
          TEMP_NUGET_API_KEY: ${{ steps.nuget-login.outputs.NUGET_API_KEY }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          packages=(artifacts/package/*.nupkg)
          if (( ${#packages[@]} == 0 )); then
            echo "::error::No .nupkg files found to publish."
            exit 1
          fi

          dotnet nuget push "${packages[@]}" \
            --api-key "${TEMP_NUGET_API_KEY}" \
            --source "https://api.nuget.org/v3/index.json"

  # Future project-type adapters can plug into the same release architecture:
  # - npm package publish
  # - React/static site build + deploy
  # - container image build + push
  # - service deployment workflows
