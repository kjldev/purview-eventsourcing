name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format-check:
    name: Format Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: ./global.json

      - name: Restore dotnet tools
        run: dotnet tool restore

      - name: CSharpier format check
        run: dotnet csharpier check .

  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    env:
      CONFIGURATION: Release
      SOLUTION: ./src/Purview.EventSourcing.slnx

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: ./global.json

      - name: Restore dependencies
        run: dotnet restore ${{ env.SOLUTION }}

      - name: Build
        run: dotnet build ${{ env.SOLUTION }} --no-restore --configuration ${{ env.CONFIGURATION }}

      - name: Run tests
        run: dotnet test ${{ env.SOLUTION }} --no-build --verbosity normal --configuration ${{ env.CONFIGURATION }}

  changeset-check:
    name: Changeset Check
    uses: kjldev/.github/.github/workflows/changeset-check.yml@main

  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    if: ${{ always() }}
    needs:
      - format-check
      - build-and-test
      - changeset-check

    steps:
      - name: Verify upstream jobs succeeded
        env:
          FORMAT_CHECK_RESULT: ${{ needs['format-check'].result }}
          BUILD_AND_TEST_RESULT: ${{ needs['build-and-test'].result }}
          CHANGESET_CHECK_RESULT: ${{ needs['changeset-check'].result }}
        shell: bash
        run: |
          set -euo pipefail

          declare -A results=(
            ["Format Check"]="${FORMAT_CHECK_RESULT}"
            ["Build and Test"]="${BUILD_AND_TEST_RESULT}"
            ["Changeset Check"]="${CHANGESET_CHECK_RESULT}"
          )

          failures=0

          for job_name in "${!results[@]}"; do
            result="${results[$job_name]}"

            if [[ "${result}" != "success" ]]; then
              echo "::error::${job_name} finished with result '${result}'."
              failures=1
            fi
          done

          if [[ "${failures}" -ne 0 ]]; then
            exit 1
          fi
