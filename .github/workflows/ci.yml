name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: t-x-kjldev

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        working-directory: src
        run: |
          dotnet restore tests/EventSourcing.UnitTests/EventSourcing.UnitTests.csproj
          dotnet restore tests/EventSourcing.SourceGenerator.UnitTests/EventSourcing.SourceGenerator.UnitTests.csproj
          dotnet restore tests/EventSourcing.Samples.UnitTests/EventSourcing.Samples.UnitTests.csproj

      - name: Build
        working-directory: src
        run: |
          dotnet build tests/EventSourcing.UnitTests/EventSourcing.UnitTests.csproj --configuration Release --no-restore
          dotnet build tests/EventSourcing.SourceGenerator.UnitTests/EventSourcing.SourceGenerator.UnitTests.csproj --configuration Release --no-restore
          dotnet build tests/EventSourcing.Samples.UnitTests/EventSourcing.Samples.UnitTests.csproj --configuration Release --no-restore

      - name: Unit Tests
        working-directory: src
        run: |
          dotnet test --project tests/EventSourcing.UnitTests/EventSourcing.UnitTests.csproj --configuration Release --no-build
          dotnet test --project tests/EventSourcing.SourceGenerator.UnitTests/EventSourcing.SourceGenerator.UnitTests.csproj --configuration Release --no-build
          dotnet test --project tests/EventSourcing.Samples.UnitTests/EventSourcing.Samples.UnitTests.csproj --configuration Release --no-build

  integration-tests:
    runs-on: t-x-kjldev

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        working-directory: src
        run: dotnet restore tests/EventSourcing.IntegrationTests/EventSourcing.IntegrationTests.csproj

      - name: Build
        working-directory: src
        run: dotnet build tests/EventSourcing.IntegrationTests/EventSourcing.IntegrationTests.csproj --configuration Release --no-restore

      - name: Integration Tests
        working-directory: src
        run: dotnet test --project tests/EventSourcing.IntegrationTests/EventSourcing.IntegrationTests.csproj --configuration Release --no-build
