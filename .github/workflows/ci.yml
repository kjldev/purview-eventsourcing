name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  checks: write
  pull-requests: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format-check:
    name: Format Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: ./global.json

      - name: Restore .NET Tools
        run: dotnet tool restore

      - name: CSharpier Format Check
        run: dotnet csharpier check ./src

  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    env:
      CONFIGURATION: Release
      SOLUTION: ./src/Purview.EventSourcing.slnx

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: ./global.json

      - name: Restore Dependencies
        run: dotnet restore ${{ env.SOLUTION }}

      - name: Build
        run: dotnet build ${{ env.SOLUTION }} --no-restore --configuration ${{ env.CONFIGURATION }}

      - name: Run Unit Tests
        run: dotnet test ${{ env.SOLUTION }} --no-build --verbosity normal --configuration ${{ env.CONFIGURATION }} --ignore-exit-code 8 --treenode-filter "/*UnitTest*/*/*/*" --results-directory ./TestResults -- --coverage --report-trx

      - name: Comment PR with results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: ./TestResults/*.trx
          comment_mode: always

      - name: Upload Test Results
        if: always() # Run even if tests fail
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: ./TestResults/*.trx

      - name: Upload Coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: ./TestResults/*.coverage

  publish-results:
    name: Publish Test Results
    needs: build-and-test
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Download all test results
        uses: actions/download-artifact@v8
        with:
          pattern: test-results
          path: ./TestResults

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: ./TestResults/**/*.trx

  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    if: ${{ always() }}
    needs:
      - format-check
      - build-and-test

    steps:
      - name: Verify upstream jobs succeeded
        env:
          FORMAT_CHECK_RESULT: ${{ needs['format-check'].result }}
          BUILD_AND_TEST_RESULT: ${{ needs['build-and-test'].result }}
        shell: bash
        run: |
          set -euo pipefail

          declare -A results=(
            ["Format Check"]="${FORMAT_CHECK_RESULT}"
            ["Build and Test"]="${BUILD_AND_TEST_RESULT}"
            ["Changeset Check"]="${CHANGESET_CHECK_RESULT}"
          )

          failures=0

          for job_name in "${!results[@]}"; do
            result="${results[$job_name]}"

            if [[ "${result}" != "success" ]]; then
              echo "::error::${job_name} finished with result '${result}'."
              failures=1
            fi
          done

          if [[ "${failures}" -ne 0 ]]; then
            exit 1
          fi
