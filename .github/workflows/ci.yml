name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test-pack:
    name: Build, test, and pack
    runs-on: t-x-kjldev

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Setup just
        uses: extractions/setup-just@v3

      - name: Restore tools
        run: just tools
        
      - name: Check formatting
        run: just check
  
      - name: Restore packages
        run: just restore

      - name: Build
        run: just build

      - name: Test
        run: just test

  ci:
    name: CI
    if: ${{ always() }}
    needs:
      - build-test-pack
    runs-on: t-x-kjldev

    steps:
      - name: Verify required CI jobs
        shell: pwsh
        run: |
          $jobs = @(
            @{ Name = "build-test-pack"; Result = "${{ needs.build-test-pack.result }}" }
          )

          $failed = @($jobs | Where-Object { $_.Result -ne "success" })
          if ($failed.Count -gt 0) {
            $summary = ($failed | ForEach-Object { "$($_.Name)=$($_.Result)" }) -join ", "
            throw "CI gate failed because these jobs did not succeed: $summary"
          }

          Write-Host "All required CI jobs succeeded."
