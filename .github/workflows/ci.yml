name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test-pack:
    runs-on: t-x-kjldev

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Setup just
        uses: extractions/setup-just@v3

      - name: Restore tools
        run: just tools

      - name: Restore packages
        run: just restore

      - name: Check formatting
        run: just check

      - name: Build
        run: just build

      - name: Test
        run: just test
